env:
  TERM: xterm-256color

window:
  # opacity: 0.95
  padding:
    x: 10
    y: 10
  scrolling: 0
  decorations: none
  # startup_mode: Maximized

alt_send_esc: false

scrolling:
  history: 0
  multiplier: 0

# Colors (Gruvbox dark)
colors:
  primary:
    background: "#273136"
    foreground: "#e1e2e3"

  normal:
    black: "#1c1e1f"
    red: "#E06C75"
    green: "#98C379"
    yellow: "#E5C07B"
    blue: "#85d3f2"
    # blue: "#60AFEE"
    magenta: "#7FE0FF"
    cyan: "#56B6C2"
    white: "#e1e2e3"

  bright:
    black: "#5c5c5c"
    red: "#E06C75"
    green: "#98C379"
    yellow: "#E5C07B"
    blue: "#85d3f2"
    # blue: "#60AFEE"
    magenta: "#7FE0FF"
    cyan: "#56B6C2"
    white: "#e1e2e3"

font:
  normal:
    family: SFMono Nerd Font
    style: Regular
  size: 16
  # use_thin_strokes: true
  offset:
    x: 1
    y: 1

key_bindings:
  - { key: Return, mods: Command, action: ToggleFullscreen }
  - { key: F, mods: Command|Control, action: None }
