[colors]
draw_bold_text_with_bright_colors = true

[colors.bright]
black = "0x82878b"
blue = "0x78cee9"
cyan = "0xf3a96a"
green = "0x9cd57b"
magenta = "0xbaa0f8"
red = "0xf76c7c"
white = "0xe1e2e3"
yellow = "0xe3d367"

[colors.normal]
black = "0x1c1e1f"
blue = "0x78cee9"
cyan = "0xf3a96a"
green = "0x9cd57b"
magenta = "0xbaa0f8"
red = "0xf76c7c"
white = "0xe1e2e3"
yellow = "0xe3d367"

[colors.primary]
background = "0x273136"
foreground = "0xe1e2e3"

[env]
TERM = "xterm-256color"
WINIT_X11_SCALE_FACTOR = "1.0"

[font]
size = 12

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.glyph_offset]
x = 0
y = 0

[font.italic]
family = "JetBrainsMono Nerd Font"

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.offset]
x = 0
y = 0

[[keyboard.bindings]]
action = "ToggleFullscreen"
key = "Return"
mods = "Command"

[[keyboard.bindings]]
action = "None"
key = "F"
mods = "Command|Control"

[scrolling]
history = 0
multiplier = 0

[selection]
semantic_escape_chars = ",│`|:\"' ()[]{}<>"

[window]
opacity = 0.97
decorations = "None"
startup_mode = "Maximized"

[window.padding]
x = 10
y = 10
